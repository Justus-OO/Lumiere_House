version: '3.8'
services:
  # Laravel Backend
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
    depends_on:
      - db

  # Next.js Frontend
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000/api
    depends_on:
      - api

  # Database
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=lumiere
      - POSTGRES_PASSWORD=secret